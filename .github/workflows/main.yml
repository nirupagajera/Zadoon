name: Run mabl Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mabl-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run mabl tests
        uses: mablhq/github-run-tests-action@v1
        env:
          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}
        with:
          application-id: "X1Gy84LsnWZfRRxgHdS0Rg-a"
          environment-id: "q2Pb9Zqiglp9MKrNA9BzmA-e"
